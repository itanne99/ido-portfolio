<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <style>
      .bg-glow {
        fill: #ffdbd0;
        opacity: 0.15;
      }
      .sun {
        fill: #ffb59e;
        opacity: 0.8;
      }
      .wave-back {
        fill: #d97757;
        animation: wave-move-back 7s ease-in-out infinite;
        transform-origin: center;
      }
      .wave-front {
        fill: #99462a;
        animation: wave-move-front 5s ease-in-out infinite;
        transform-origin: center;
      }
      .boat-group {
        animation: boat-bob 4s ease-in-out infinite;
        transform-origin: 200px 185px;
      }
      .boat-hull {
        fill: #1f1b14;
      }
      .boat-sail {
        fill: #ffffff;
      }
      .boat-flag {
        fill: #99462a;
      }
      .stars {
        fill: #ffb59e;
        opacity: 0.6;
      }

      @keyframes wave-move-back {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-10px, 2px); }
      }
      @keyframes wave-move-front {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(12px, -3px); }
      }
      @keyframes boat-bob {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-7px) rotate(-4deg); }
      }

      @media (prefers-reduced-motion: reduce) {
        .wave-back, .wave-front, .boat-group {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <!-- Background Warm Glow -->
  <circle cx="200" cy="150" r="180" class="bg-glow" />

  <!-- The Sun -->
  <circle cx="200" cy="120" r="45" class="sun" />

  <!-- Stars / Digital Dust -->
  <circle cx="80" cy="60" r="1.5" class="stars" />
  <circle cx="120" cy="90" r="1" class="stars" />
  <circle cx="290" cy="50" r="2" class="stars" />
  <circle cx="320" cy="100" r="1.5" class="stars" />

  <!-- Background Wave -->
  <path class="wave-back" d="M-50,185 Q50,170 150,185 T350,185 T550,185 L550,320 L-50,320 Z" />

  <!-- Sailboat Group -->
  <g class="boat-group">
    <!-- Mast -->
    <line x1="200" y1="180" x2="200" y2="105" stroke="#1f1b14" stroke-width="3.5" stroke-linecap="round" />
    
    <!-- Main Sail -->
    <path class="boat-sail" d="M200,110 C200,110 230,125 230,145 C230,165 200,175 200,175 Z" />
    
    <!-- Jib Sail (Front Sail) -->
    <path class="boat-sail" d="M196,115 C196,115 165,135 165,155 C165,170 196,175 196,175 Z" opacity="0.9" />
    
    <!-- Flag -->
    <path class="boat-flag" d="M200,105 L212,111 L200,117 Z" />
    
    <!-- Hull -->
    <path class="boat-hull" d="M150,178 L250,178 L235,198 L165,198 Z" />
    
    <!-- Cabin/Detail -->
    <rect x="180" y="172" width="40" height="6" rx="2" fill="#e2d9ce" opacity="0.8" />
  </g>

  <!-- Foreground Wave -->
  <path class="wave-front" d="M-50,195 Q50,210 150,195 T350,195 T550,195 L550,320 L-50,320 Z" />
</svg>
